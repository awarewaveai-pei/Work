# trigger.aware-wave.com → trigger-webapp (localhost:8030)
<VirtualHost *:80>
    ServerName trigger.aware-wave.com
    RewriteEngine On
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName trigger.aware-wave.com

    ProxyPreserveHost On
    ProxyRequests Off

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://localhost:8030/$1 [P,L]

    ProxyPass / http://localhost:8030/
    ProxyPassReverse / http://localhost:8030/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    SSLCertificateFile /etc/letsencrypt/live/trigger.aware-wave.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/trigger.aware-wave.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
