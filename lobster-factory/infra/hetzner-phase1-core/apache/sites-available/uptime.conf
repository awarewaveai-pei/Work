# uptime.aware-wave.com → Uptime Kuma (localhost:3050)
<VirtualHost *:80>
    ServerName uptime.aware-wave.com
    RewriteEngine On
    RewriteCond %{SERVER_NAME} =uptime.aware-wave.com
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName uptime.aware-wave.com

    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket support (Uptime Kuma uses Socket.IO)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://localhost:3050/$1 [P,L]

    ProxyPass / http://localhost:3050/
    ProxyPassReverse / http://localhost:3050/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    SSLCertificateFile /etc/letsencrypt/live/uptime.aware-wave.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/uptime.aware-wave.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
