# n8n.aware-wave.com → n8n (localhost:5678)
# Basic auth via .htpasswd: sudo htpasswd -c /etc/apache2/.htpasswd_n8n <user>
<VirtualHost *:80>
    ServerName n8n.aware-wave.com
    RewriteEngine On
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName n8n.aware-wave.com

    ProxyPreserveHost On
    ProxyRequests Off

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://localhost:5678/$1 [P,L]

    ProxyPass / http://localhost:5678/
    ProxyPassReverse / http://localhost:5678/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    SSLCertificateFile /etc/letsencrypt/live/n8n.aware-wave.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/n8n.aware-wave.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
