# aware-wave.com — WordPress (system Apache, port 80 → HTTPS redirect)
# Added UseCanonicalName to mitigate CVE-2017-8295
UseCanonicalName On

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    ServerName aware-wave.com
    ServerAlias www.aware-wave.com

    DocumentRoot /var/www/html

    <Directory /var/www/html/>
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    RewriteEngine on
    RewriteCond %{SERVER_NAME} =aware-wave.com [OR]
    RewriteCond %{SERVER_NAME} =www.aware-wave.com
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
