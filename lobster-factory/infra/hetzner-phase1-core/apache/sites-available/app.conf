# app.aware-wave.com → next-admin (localhost:3002)
# next-admin serves at / (no basePath). Apache proxies directly.
# /admin redirect ensures old bookmarks still work.
<VirtualHost *:80>
    ServerName app.aware-wave.com
    RewriteEngine On
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName app.aware-wave.com

    ProxyPreserveHost On
    ProxyRequests Off

    RewriteEngine On
    # Redirect /admin (old path) to root — next-admin has no basePath
    RewriteRule ^/admin/?$ / [R=301,L]

    # WebSocket support (Next.js HMR / future use)
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://localhost:3002/$1 [P,L]

    ProxyPass / http://localhost:3002/
    ProxyPassReverse / http://localhost:3002/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # SAN cert covers both api + app subdomains
    SSLCertificateFile /etc/letsencrypt/live/api.aware-wave.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/api.aware-wave.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
