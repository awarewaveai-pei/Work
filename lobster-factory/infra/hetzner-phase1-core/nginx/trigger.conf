# Trigger.dev — https://trigger.aware-wave.com
# VPS ACTUAL CONFIG: System nginx at /etc/nginx/sites-available/trigger (not this Docker nginx file)
# This file is kept as reference; the VPS uses system nginx with Let's Encrypt SSL.
# VPS nginx binds HTTPS on 443 with certbot certs and proxies to 127.0.0.1:8030 (trigger-webapp host port).
#
# Docker nginx (lobster-nginx) does NOT serve trigger — it conflicts on port 80 with system nginx.
# Trigger-specific system nginx config on VPS:
#   location / → proxy_pass http://127.0.0.1:8030 (trigger-webapp port 8030)
#   location /packets/ → proxy_pass http://127.0.0.1:9000 (MinIO)
#   WebSocket: Upgrade + Connection upgrade headers, proxy_buffering off
#
# This Docker-nginx conf is for local/staging setups without system nginx in front.

server {
    listen 80;
    server_name trigger.aware-wave.com;

    client_max_body_size 50M;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # MinIO packets bucket (deployment artifacts)
    location ^~ /packets/ {
        proxy_pass http://trigger-minio:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        # Trigger.dev v4 webapp listens on container port 3000 (v3 used 3030).
        proxy_pass http://trigger-webapp:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket support (Electric SQL real-time + dashboard)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }
}
