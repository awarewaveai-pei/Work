# supabase.aware-wave.com  → Supabase Kong API (127.0.0.1:8000)  — AI MCP access, JWT-protected
# studio.aware-wave.com   → Supabase Studio  (127.0.0.1:3000)  — human UI, basic-auth protected
#
# Install:
#   sudo cp supabase-subdomains.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/supabase-subdomains.conf /etc/nginx/sites-enabled/supabase
#   sudo apt install apache2-utils -y
#   sudo htpasswd -c /etc/nginx/.htpasswd_studio <your-username>
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS:
#   sudo certbot certonly --nginx -d supabase.aware-wave.com -d studio.aware-wave.com

# ── supabase.aware-wave.com (Kong API) ────────────────────────────────────────
server {
    server_name supabase.aware-wave.com;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 50M;
        proxy_read_timeout 300s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/supabase.aware-wave.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/supabase.aware-wave.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = supabase.aware-wave.com) { return 301 https://$host$request_uri; }
    listen 80;
    server_name supabase.aware-wave.com;
    return 404;
}

# ── studio.aware-wave.com (Supabase Studio) ───────────────────────────────────
server {
    server_name studio.aware-wave.com;

    # Basic auth — only you can access Studio
    auth_basic "Supabase Studio";
    auth_basic_user_file /etc/nginx/.htpasswd_studio;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 50M;
        proxy_read_timeout 300s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/supabase.aware-wave.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/supabase.aware-wave.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = studio.aware-wave.com) { return 301 https://$host$request_uri; }
    listen 80;
    server_name studio.aware-wave.com;
    return 404;
}
