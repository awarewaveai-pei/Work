# System nginx — Cloudflare-facing subdomains (same VPS as apex aware-wave.com)
#
# Intended mapping:
#   api.aware-wave.com  → node-api (127.0.0.1:3001), path at container root (clean /health, /rag/…)
#   app.aware-wave.com  → **302 → https://aware-wave.com/admin/**（與目前 `basePath=/admin`、以 apex 為公開網址一致；避免換 Host 造成 `_next`／cookie 錯位）
#     若未來要「app 子網域直出 Next」需另建置／環境變數，勿只用本檔反代硬改 Host。
#
# Cloudflare: A/AAAA for `api` + `app` → this host; SSL/TLS = Full or Full (strict); WebSockets on if you proxy WS here.
#
# TLS (example — one SAN cert for both names; paths follow certbot first hostname):
#   sudo certbot certonly --nginx -d api.aware-wave.com -d app.aware-wave.com
# Then set SSL paths below to match `ls /etc/letsencrypt/live/`.
#
# Install:
#   sudo cp aware-wave-app-api-subdomains.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/aware-wave-app-api-subdomains.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# --- HTTP → HTTPS (both hostnames) ---
server {
    listen 80;
    listen [::]:80;
    server_name api.aware-wave.com app.aware-wave.com;
    return 301 https://$host$request_uri;
}

# --- api.aware-wave.com (HTTPS) → node-api ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.aware-wave.com;

    ssl_certificate     /etc/letsencrypt/live/api.aware-wave.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.aware-wave.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 50M;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- app.aware-wave.com (HTTPS) → canonical Next admin on apex ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.aware-wave.com;

    ssl_certificate     /etc/letsencrypt/live/api.aware-wave.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.aware-wave.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    location / {
        return 302 https://aware-wave.com/admin/;
    }
}
