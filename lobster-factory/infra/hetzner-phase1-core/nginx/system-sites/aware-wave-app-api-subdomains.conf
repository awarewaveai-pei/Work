# System nginx — Cloudflare-facing subdomains (same VPS as apex aware-wave.com)
#
# api.aware-wave.com  → node-api (127.0.0.1:3001)
# app.aware-wave.com  → next-admin (127.0.0.1:3002) — serves at / (no basePath)
#
# Install:
#   sudo cp aware-wave-app-api-subdomains.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/aware-wave-app-api-subdomains.conf /etc/nginx/sites-enabled/app
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: one SAN cert for api + app
#   sudo certbot certonly --nginx -d api.aware-wave.com -d app.aware-wave.com

server {
    server_name app.aware-wave.com;

    # /admin was old basePath — redirect to root for backwards compat
    location ~ ^/admin/?$ { return 301 /; }

    # Ops API path: apply trusted proxy headers for role resolution.
    # Install snippet to /etc/nginx/snippets/ops-proxy-headers.inc
    location ^~ /api/ops/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/snippets/ops-proxy-headers.inc;
        client_max_body_size 50M;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 50M;
        proxy_read_timeout 300s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.aware-wave.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.aware-wave.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = app.aware-wave.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name app.aware-wave.com;
    return 404;
}

server {
    server_name api.aware-wave.com;

    location / {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 50M;
        proxy_read_timeout 300s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.aware-wave.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.aware-wave.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = api.aware-wave.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name api.aware-wave.com;
    return 404;
}
