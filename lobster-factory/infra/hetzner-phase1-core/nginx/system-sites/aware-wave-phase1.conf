# System nginx (VPS) — apex aware-wave.com
#
# Install (paths match Ubuntu nginx layout):
#   sudo cp lobster-aware-wave-locations.inc /etc/nginx/snippets/lobster-aware-wave-locations.inc
#   sudo cp aware-wave-phase1.conf /etc/nginx/sites-available/aware-wave-phase1
#   sudo ln -sf /etc/nginx/sites-available/aware-wave-phase1 /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# CRITICAL: Browsers use HTTPS. After certbot, you MUST have the same routing on :443.
# This file defines BOTH :80 and :443 with one shared include. If TLS files are missing,
# comment out the second `server` block until `certbot --nginx` has run once.

server {
    listen 80;
    listen [::]:80;
    server_name aware-wave.com www.aware-wave.com;

    client_max_body_size 50M;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    include snippets/lobster-aware-wave-locations.inc;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aware-wave.com www.aware-wave.com;

    ssl_certificate     /etc/letsencrypt/live/aware-wave.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aware-wave.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 50M;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    include snippets/lobster-aware-wave-locations.inc;
}
