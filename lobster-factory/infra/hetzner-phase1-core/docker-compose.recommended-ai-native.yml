version: "3.9"

# 結構建議：單台 Hetzner（8GB）
# - 本檔不放任何真實密鑰。
# - 對外僅 reverse-proxy 暴露。
# - 依既有規格：Trigger.dev 為 durable owner（另在 infra/trigger compose），
#   本檔聚焦 n8n（glue）+ worker + WordPress 執行面。

services:
  reverse-proxy:
    image: nginx:stable
    container_name: aos-reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      wordpress:
        condition: service_healthy
      n8n:
        condition: service_healthy
      worker:
        condition: service_healthy
    networks:
      - public_net
      - internal_net

  wordpress:
    image: wordpress:php8.3-fpm
    container_name: aos-wordpress
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    mem_limit: 1024m
    networks:
      - internal_net

  mariadb:
    image: mariadb:11
    container_name: aos-mariadb
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
      MYSQL_USER: ${WORDPRESS_DB_USER}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${WORDPRESS_DB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 5s
      retries: 8
    mem_limit: 1024m
    networks:
      - internal_net

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.15.1
    container_name: aos-n8n
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      GENERIC_TIMEZONE: Asia/Taipei
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_SENTRY_DSN: ${N8N_SENTRY_DSN:-${SENTRY_DSN_N8N:-}}
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - n8n_data:/home/node/.n8n
    expose:
      - "5678"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:5678/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 30s
    mem_limit: 768m
    networks:
      - internal_net

  worker:
    build:
      context: ./apps/node-api
      dockerfile: Dockerfile
    container_name: aos-worker
    restart: unless-stopped
    environment:
      PORT: "3001"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
      REDIS_URL: redis://redis:6379
    expose:
      - "3001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    mem_limit: 768m
    networks:
      - internal_net

  redis:
    image: redis:7-alpine
    container_name: aos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 8
    mem_limit: 256m
    networks:
      - internal_net

networks:
  public_net:
    driver: bridge
  internal_net:
    driver: bridge

volumes:
  wordpress_data:
  mariadb_data:
  n8n_data:
  redis_data:
