# Phase 1 — production-oriented: multi-stage builds for Node apps, healthchecks, Nginx gates on app readiness.
# Supabase is external; set SUPABASE_* in .env.
#
# Build & run: docker compose --env-file .env build --no-cache && docker compose --env-file .env up -d
# After changing NEXT_PUBLIC_*: rebuild next-admin (baked at build time).
#
# Long-run: image pin policy, backups, DR drills — see LONG_TERM_OPS.md (Owner).
# Log rotation via json-file limits avoids filling disk over years of uptime.

x-logging: &lobster-logging
  driver: json-file
  options:
    max-size: "25m"
    max-file: "5"

services:
  nginx:
    image: nginx:stable
    container_name: lobster-nginx
    restart: unless-stopped
    depends_on:
      node-api:
        condition: service_healthy
      next-admin:
        condition: service_healthy
      wordpress:
        condition: service_healthy
      n8n:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/trigger.conf:/etc/nginx/conf.d/trigger.conf:ro
    networks:
      - lobster-net
    logging: *lobster-logging

  redis:
    image: redis:7-alpine
    container_name: lobster-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - lobster-net
    logging: *lobster-logging

  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_IMAGE_TAG:-2.15.1}
    container_name: lobster-n8n
    restart: unless-stopped
    environment:
      TZ: Asia/Taipei
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      N8N_PATH: /n8n/
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      GENERIC_TIMEZONE: Asia/Taipei
      N8N_SECURE_COOKIE: "false"
      N8N_PROXY_HOPS: "1"
      # Sentry (self-hosted n8n) — see https://github.com/n8n-io/n8n/blob/master/packages/@n8n/config/src/configs/sentry.config.ts
      N8N_SENTRY_DSN: ${SENTRY_DSN_N8N:-}
      N8N_FRONTEND_SENTRY_DSN: ${SENTRY_DSN_N8N_FRONTEND:-}
      ENVIRONMENT: ${N8N_SENTRY_ENVIRONMENT:-staging}
      DEPLOYMENT_NAME: ${N8N_DEPLOYMENT_NAME:-lobster-phase1-n8n}
      N8N_SENTRY_TRACES_SAMPLE_RATE: ${N8N_SENTRY_TRACES_SAMPLE_RATE:-0}
      N8N_SENTRY_PROFILES_SAMPLE_RATE: ${N8N_SENTRY_PROFILES_SAMPLE_RATE:-0}
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:5678/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - lobster-net
    logging: *lobster-logging

  wordpress-db:
    image: mariadb:11
    container_name: lobster-wordpress-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
      MYSQL_USER: ${WORDPRESS_DB_USER}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${WORDPRESS_DB_ROOT_PASSWORD}
    volumes:
      - wordpress_db_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "healthcheck.sh",
          "--connect",
          "--innodb_initialized"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - lobster-net
    logging: *lobster-logging

  wordpress:
    build:
      context: ./apps/wordpress
      dockerfile: Dockerfile
    image: lobster-phase1-wordpress:local
    container_name: lobster-wordpress
    restart: unless-stopped
    depends_on:
      wordpress-db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: wordpress-db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      SENTRY_DSN: ${SENTRY_DSN_WP}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', '${WORDPRESS_PUBLIC_URL}');
        define('WP_SITEURL', '${WORDPRESS_PUBLIC_URL}');
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
          $$_SERVER['HTTPS'] = 'on';
        }
    volumes:
      - wordpress_data:/var/www/html
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1/ > /dev/null || exit 1"
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - lobster-net
    logging: *lobster-logging

  node-api:
    build:
      context: ./apps/node-api
      dockerfile: Dockerfile
    image: lobster-phase1-node-api:local
    container_name: lobster-node-api
    restart: unless-stopped
    environment:
      PORT: "3001"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_URL: redis://redis:6379
      SENTRY_DSN: ${SENTRY_DSN}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3001/health > /dev/null || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - lobster-net
    logging: *lobster-logging

  next-admin:
    build:
      context: ./apps/next-admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_BASE_PATH: /api
        NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN_NEXT}
    image: lobster-phase1-next-admin:local
    container_name: lobster-next-admin
    restart: unless-stopped
    environment:
      PORT: "3000"
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL}
      NEXT_PUBLIC_API_BASE_PATH: /api
      NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN_NEXT}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      node-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/ > /dev/null || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 50s
    networks:
      - lobster-net
    logging: *lobster-logging

networks:
  lobster-net:
    name: lobster-net    # explicit name so trigger compose can join as external
    driver: bridge

volumes:
  redis_data:
  n8n_data:
  wordpress_db_data:
  wordpress_data:
