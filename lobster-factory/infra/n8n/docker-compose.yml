name: n8n

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:2.15.1
    container_name: n8n
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "5"
    mem_limit: 512m
    cpus: "0.5"
    ports:
      - '127.0.0.1:5678:5678'
    environment:
      - N8N_HOST=n8n.aware-wave.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_PATH=/
      - N8N_PROXY_HOPS=1
      - WEBHOOK_URL=https://n8n.aware-wave.com/
      - N8N_EDITOR_BASE_URL=https://n8n.aware-wave.com/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=supabase-db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_AUTH_PASSWORD}
      - N8N_LOG_LEVEL=info
      - GENERIC_TIMEZONE=Asia/Taipei
      - TZ=Asia/Taipei
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - supabase_default

volumes:
  n8n_data:

networks:
  supabase_default:
    external: true
