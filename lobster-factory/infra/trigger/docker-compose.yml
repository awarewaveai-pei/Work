# Trigger.dev v4 — self-hosted (aligned with upstream hosting/docker)
# Upstream reference: https://github.com/triggerdotdev/trigger.dev/tree/main/hosting/docker
# Docs: https://trigger.dev/docs/self-hosting/docker
#
# Prerequisites:
#   1. phase1-core running (external docker network `lobster-net`; see hetzner-phase1-core)
#   2. cp .env.example .env && fill secrets + URLs
#   3. docker compose --env-file .env up -d
#
# Apache (system) proxies trigger.aware-wave.com → localhost:8030 (trigger-webapp).
# Repo workflows use @trigger.dev/sdk 4.x — keep platform on v4 (do not pin to v3 without downgrading SDK).

name: trigger

x-logging: &trigger-logging
  driver: json-file
  options:
    max-size: "25m"
    max-file: "5"

services:
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16}
    container_name: trigger-postgres
    restart: unless-stopped
    logging: *trigger-logging
    mem_limit: 512m
    cpus: "1.0"
    command:
      - -c
      - wal_level=logical
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-main}
    volumes:
      - trigger_pg_data:/var/lib/postgresql/data
    networks:
      - lf-trg-webapp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:${REDIS_IMAGE_TAG:-7-alpine}
    container_name: trigger-redis
    restart: unless-stopped
    logging: *trigger-logging
    mem_limit: 256m
    cpus: "0.3"
    volumes:
      - trigger_redis_data:/data
    networks:
      - lf-trg-webapp
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  clickhouse:
    image: bitnamilegacy/clickhouse:${CLICKHOUSE_IMAGE_TAG:-25.7.5-debian-12-r0}
    container_name: trigger-clickhouse
    restart: unless-stopped
    logging: *trigger-logging
    mem_limit: 2048m
    cpus: 1.5
    environment:
      CLICKHOUSE_ADMIN_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_ADMIN_PASSWORD: ${CLICKHOUSE_PASSWORD:-password}
    volumes:
      - trigger_clickhouse_data:/bitnami/clickhouse
      - ./clickhouse/override.xml:/bitnami/clickhouse/etc/config.d/override.xml:ro
    networks:
      - lf-trg-webapp
    ports:
      - ${CLICKHOUSE_PUBLISH_IP:-127.0.0.1}:9123:8123
      - ${CLICKHOUSE_PUBLISH_IP:-127.0.0.1}:9090:9000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --host localhost --port 9000 --user \"$$CLICKHOUSE_ADMIN_USER\" --password \"$$CLICKHOUSE_ADMIN_PASSWORD\" --query 'SELECT 1'",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  clickhouse-config-check:
    image: bitnamilegacy/clickhouse:${CLICKHOUSE_IMAGE_TAG:-25.7.5-debian-12-r0}
    container_name: trigger-clickhouse-config-check
    profiles: ["preflight"]
    restart: "no"
    logging: *trigger-logging
    # Bitnami: overriding `command` skips run.sh/setup unless we invoke setup explicitly.
    # Upstream ClickHouse 24.x unified binary no longer exposes `--check-config` on this image.
    # `extract-from-config` merges includes + config.d (override.xml) and fails on invalid XML/keys.
    # Compose `$$` → literal `$` for bash (see compose variable escaping).
    command:
      [
        "/bin/bash",
        "-lc",
        "/opt/bitnami/scripts/clickhouse/setup.sh && . /opt/bitnami/scripts/clickhouse-env.sh && /opt/bitnami/clickhouse/bin/clickhouse extract-from-config --config-file=$$CLICKHOUSE_CONF_FILE --key=logger",
      ]
    environment:
      CLICKHOUSE_ADMIN_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_ADMIN_PASSWORD: ${CLICKHOUSE_PASSWORD:-password}
    volumes:
      - ./clickhouse/override.xml:/bitnami/clickhouse/etc/config.d/override.xml:ro
    networks:
      - lf-trg-webapp

  registry:
    image: registry:${REGISTRY_IMAGE_TAG:-2}
    container_name: trigger-registry
    restart: unless-stopped
    logging: *trigger-logging
    networks:
      - lf-trg-webapp
    volumes:
      - ./registry/auth.htpasswd:/auth/htpasswd:ro
    environment:
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: Registry Realm
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
    ports:
      - ${REGISTRY_PUBLISH_IP:-127.0.0.1}:5000:5000

  minio:
    image: bitnamilegacy/minio:${MINIO_IMAGE_TAG:-latest}
    container_name: trigger-minio
    restart: unless-stopped
    logging: *trigger-logging
    mem_limit: 384m
    cpus: "0.3"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-very-safe-password}
      MINIO_DEFAULT_BUCKETS: packets
      MINIO_BROWSER: "on"
    volumes:
      - trigger_minio_data:/bitnami/minio/data
    networks:
      - lf-trg-webapp
    ports:
      - ${MINIO_PUBLISH_IP:-127.0.0.1}:9000:9000
      - ${MINIO_PUBLISH_IP:-127.0.0.1}:9001:9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  electric:
    image: electricsql/electric:${ELECTRIC_IMAGE_TAG:-1.2.4}
    container_name: trigger-electric
    restart: unless-stopped
    logging: *trigger-logging
    mem_limit: 384m
    cpus: "0.5"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ELECTRIC_INSECURE: "true"
      ELECTRIC_USAGE_REPORTING: "false"
    networks:
      - lf-trg-webapp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  webapp:
    image: ghcr.io/triggerdotdev/trigger.dev:${TRIGGER_IMAGE_TAG:-v4.4.4}
    container_name: trigger-webapp
    restart: unless-stopped
    logging: *trigger-logging
    user: root
    command: sh -c "chown -R node:node /home/node/shared && exec ./scripts/entrypoint.sh"
    mem_limit: 2048m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      registry:
        condition: service_started
      minio:
        condition: service_healthy
      electric:
        condition: service_healthy
    volumes:
      - trigger_shared:/home/node/shared
    networks:
      - lf-trg-webapp
      - lf-trg-supervisor
      - lobster-net
    ports:
      - ${WEBAPP_PUBLISH_IP:-127.0.0.1}:8030:3000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "http.get('http://localhost:3000/healthcheck', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    environment:
      APP_ORIGIN: ${APP_ORIGIN}
      LOGIN_ORIGIN: ${LOGIN_ORIGIN}
      API_ORIGIN: ${API_ORIGIN:-${APP_ORIGIN}}
      STREAM_ORIGIN: ${STREAM_ORIGIN:-${APP_ORIGIN}}
      ELECTRIC_ORIGIN: http://electric:3000
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      MANAGED_WORKER_SECRET: ${MANAGED_WORKER_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_TLS_DISABLED: "true"
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-info}
      DEV_OTEL_EXPORTER_OTLP_ENDPOINT: ${DEV_OTEL_EXPORTER_OTLP_ENDPOINT:-http://webapp:3000/otel}
      NODE_MAX_OLD_SPACE_SIZE: ${NODE_MAX_OLD_SPACE_SIZE:-1024}
      NODE_ENV: production
      TRIGGER_TELEMETRY_DISABLED: "1"
      DEPLOY_REGISTRY_HOST: ${DOCKER_REGISTRY_URL}
      V4_DEPLOY_REGISTRY_HOST: ${DOCKER_REGISTRY_URL}
      DEPLOY_REGISTRY_NAMESPACE: ${DEPLOY_REGISTRY_NAMESPACE:-trigger}
      DEPLOY_REGISTRY_USERNAME: ${DEPLOY_REGISTRY_USERNAME}
      DEPLOY_REGISTRY_PASSWORD: ${DEPLOY_REGISTRY_PASSWORD}
      OBJECT_STORE_BASE_URL: ${OBJECT_STORE_BASE_URL:-http://minio:9000}
      OBJECT_STORE_BUCKET: ${OBJECT_STORE_BUCKET:-packets}
      OBJECT_STORE_ACCESS_KEY_ID: ${OBJECT_STORE_ACCESS_KEY_ID}
      OBJECT_STORE_SECRET_ACCESS_KEY: ${OBJECT_STORE_SECRET_ACCESS_KEY}
      OBJECT_STORE_SERVICE: ${OBJECT_STORE_SERVICE:-s3}
      ARTIFACTS_OBJECT_STORE_BASE_URL: ${ARTIFACTS_OBJECT_STORE_BASE_URL:-http://minio:9000}
      ARTIFACTS_OBJECT_STORE_BUCKET: ${ARTIFACTS_OBJECT_STORE_BUCKET:-packets}
      ARTIFACTS_OBJECT_STORE_ACCESS_KEY_ID: ${ARTIFACTS_OBJECT_STORE_ACCESS_KEY_ID:-${OBJECT_STORE_ACCESS_KEY_ID}}
      ARTIFACTS_OBJECT_STORE_SECRET_ACCESS_KEY: ${ARTIFACTS_OBJECT_STORE_SECRET_ACCESS_KEY:-${OBJECT_STORE_SECRET_ACCESS_KEY}}
      ARTIFACTS_OBJECT_STORE_REGION: ${ARTIFACTS_OBJECT_STORE_REGION:-us-east-1}
      GRACEFUL_SHUTDOWN_TIMEOUT: "1000"
      TRIGGER_BOOTSTRAP_ENABLED: "1"
      TRIGGER_BOOTSTRAP_WORKER_GROUP_NAME: ${TRIGGER_BOOTSTRAP_WORKER_GROUP_NAME:-bootstrap}
      TRIGGER_BOOTSTRAP_WORKER_TOKEN_PATH: /home/node/shared/worker_token
      CLICKHOUSE_URL: ${CLICKHOUSE_URL}
      CLICKHOUSE_LOG_LEVEL: ${CLICKHOUSE_LOG_LEVEL:-info}
      RUN_REPLICATION_ENABLED: ${RUN_REPLICATION_ENABLED:-1}
      RUN_REPLICATION_CLICKHOUSE_URL: ${RUN_REPLICATION_CLICKHOUSE_URL:-${CLICKHOUSE_URL}}
      RUN_REPLICATION_LOG_LEVEL: ${RUN_REPLICATION_LOG_LEVEL:-info}
      INTERNAL_OTEL_TRACE_LOGGING_ENABLED: ${INTERNAL_OTEL_TRACE_LOGGING_ENABLED:-0}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-resend}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@aware-wave.com}
      REPLY_TO_EMAIL: ${REPLY_TO_EMAIL:-awarewaveai@gmail.com}

  docker-proxy:
    image: tecnativa/docker-socket-proxy:${DOCKER_PROXY_IMAGE_TAG:-latest}
    container_name: trigger-docker-proxy
    restart: unless-stopped
    logging: *trigger-logging
    mem_limit: 64m
    cpus: "0.1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - lf-trg-docker-proxy
    environment:
      - LOG_LEVEL=info
      - POST=1
      - CONTAINERS=1
      - IMAGES=1
      - INFO=1
      - NETWORKS=1
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "2375"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  supervisor:
    image: ghcr.io/triggerdotdev/supervisor:${TRIGGER_IMAGE_TAG:-v4.4.4}
    container_name: trigger-supervisor
    restart: unless-stopped
    logging: *trigger-logging
    user: root
    command: sh -c "chown -R node:node /home/node/shared && exec /usr/bin/dumb-init -- pnpm run --filter supervisor start"
    mem_limit: 1280m
    cpus: "1.0"
    depends_on:
      docker-proxy:
        condition: service_healthy
      webapp:
        condition: service_healthy
    volumes:
      - trigger_shared:/home/node/shared
    ports:
      - "127.0.0.1:8020:8020"
    networks:
      - lf-trg-supervisor
      - lf-trg-docker-proxy
      - lf-trg-webapp
    environment:
      TRIGGER_WORKER_TOKEN: ${TRIGGER_WORKER_TOKEN:-file:///home/node/shared/worker_token}
      MANAGED_WORKER_SECRET: ${MANAGED_WORKER_SECRET}
      TRIGGER_API_URL: ${TRIGGER_API_URL:-http://webapp:3000}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://webapp:3000/otel}
      TRIGGER_WORKLOAD_API_DOMAIN: supervisor
      TRIGGER_WORKLOAD_API_PORT_EXTERNAL: "8020"
      DEBUG: ${SUPERVISOR_DEBUG:-0}
      ENFORCE_MACHINE_PRESETS: "1"
      TRIGGER_DEQUEUE_INTERVAL_MS: "1000"
      DOCKER_HOST: tcp://docker-proxy:2375
      DOCKER_RUNNER_NETWORKS: lf-trg-webapp,lf-trg-supervisor
      DOCKER_REGISTRY_URL: ${DOCKER_REGISTRY_URL}
      DOCKER_REGISTRY_USERNAME: ${DEPLOY_REGISTRY_USERNAME}
      DOCKER_REGISTRY_PASSWORD: ${DEPLOY_REGISTRY_PASSWORD}
      DOCKER_AUTOREMOVE_EXITED_CONTAINERS: "0"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "http.get('http://localhost:8020/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  lf-trg-webapp:
    name: lf-trg-webapp
  lf-trg-supervisor:
    name: lf-trg-supervisor
  lf-trg-docker-proxy:
    name: lf-trg-docker-proxy
  lobster-net:
    external: true
    name: ${LOBSTER_DOCKER_NETWORK:-lobster-net}

volumes:
  trigger_pg_data:
  trigger_redis_data:
  trigger_clickhouse_data:
  trigger_minio_data:
  trigger_shared:
